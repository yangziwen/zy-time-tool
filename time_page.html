<html>
<head>
<meta http-equiv="content-type" content="text/html;charset=utf-8">
<link rel="stylesheet" href="css/bootstrap.min.css" >
<style>
* {
    margin: 0;
    padding: 0;
}

body {
    width: 360px;
}

div {
    text-align: center;
    margin: 10px;
}

.btn, .form-control {
    font-size: 12px;
}

#zy_time_area {
    margin-bottom: 15px;
}

#zy_time_area input, #zy_time_area textarea {
    width: 280px;
    margin: auto;
}

#zy_time_area textarea {
    height: 80px;
    resize: vertical;
}

.batch-mode #zy_time_area textarea {
    height: 120px;
}

.hidden {
    display: none !important;
}
</style>
</head>
<body>
<div id="zy_time_area">
    <h5><img src="images/icon38.png"
             style="width: 24px; height: 24px; margin-right: 5px; margin-bottom: 5px;"/>时间日期工具</h5>
    <div>
        <label style="font-size: 12px;">时区：</label>
        <select id="zy_timezone_select" class="form-control form-control-sm"
                style="display: inline-block; width: 200px;">
            <option value="Asia/Shanghai">中国标准时间 (UTC+8)</option>
            <option value="UTC">协调世界时 (UTC)</option>
            <option value="Europe/Paris">巴黎时间 (UTC+1)</option>
            <option value="Africa/Cairo">开罗时间 (UTC+2)</option>
            <option value="Asia/Riyadh">利雅得时间 (UTC+3)</option>
            <option value="Asia/Dubai">迪拜时间 (UTC+4)</option>
            <option value="Asia/Karachi">卡拉奇时间 (UTC+5)</option>
            <option value="Asia/Bangkok">曼谷时间 (UTC+7)</option>
            <option value="Asia/Tokyo">东京时间 (UTC+9)</option>
            <option value="Australia/Sydney">悉尼时间 (UTC+10)</option>
            <option value="America/New_York">纽约时间 (UTC-5)</option>
            <option value="America/Los_Angeles">洛杉矶时间 (UTC-8)</option>
        </select>
    </div>
    <div>
        <button id="zy_current_time_btn" class="btn btn-primary btn-sm">当前的时间</button>
        &nbsp;
        <button id="zy_selection_time_btn" class="btn btn-primary btn-sm">选中的时间</button>
        &nbsp;
        <button id="zy_clear_time_btn" class="btn btn-primary btn-sm">清空时间</button>
    </div>
    <div>
        <input id="zy_ts_input" type="text" class="form-control form-control-sm"
               placeholder="请输入长整型时间戳"/>
        <textarea id="zy_ts_input_batch" class="form-control form-control-sm hidden"
                  placeholder="请输入多个长整型时间戳（每行一个）"></textarea>
    </div>
    <div>
        <button id="zy_ts_to_dt_btn" class="btn btn-primary btn-sm">↓&nbsp;转日期&nbsp;↓</button>
        &nbsp;
        <button id="zy_dt_to_ts_btn" class="btn btn-primary btn-sm">↑&nbsp;转时间戳&nbsp;↑</button>
        &nbsp;
        <button id="zy_batch_mode_btn" class="btn btn-primary btn-sm">批量模式</button>
    </div>
    <div>
        <input id="zy_dt_input" type="text" class="form-control form-control-sm"
               placeholder="请输入yyyy-MM-dd HH:mm:ss格式时间"/>
        <textarea id="zy_dt_input_batch" class="form-control form-control-sm hidden"
                  placeholder="请输入多个时间（每行一个，格式: yyyy-MM-dd HH:mm:ss）"></textarea>
    </div>
    <div>
        <button id="zy_truncate_time_btn" class="btn btn-primary btn-sm">向下取整</button>
        <button id="zy_minus_time_btn" class="btn btn-primary btn-sm" style="font-size:15px; line-height:70%;height: 28px; width: 28px;">-</button>
        <input id="zy_time_delta_input" type="number" class="form-control form-control-sm" style="display: inline-block; width: 55px;" value="1"/>
        <select id="zy_time_unit_select" class="form-control form-control-sm" style="display: inline-block; width: 55px;">
            <option value="second">秒</option>
            <option value="minute">分</option>
            <option value="hour">时</option>
            <option value="day" selected>天</option>
            <option value="week">周</option>
            <option value="month">月</option>
            <option value="year">年</option>
        </select>
        <button id="zy_plus_time_btn" class="btn btn-primary btn-sm" style="font-size:15px; line-height:70%;height: 28px; width: 28px;" >+</button>
        <button id="zy_ceiling_time_btn" class="btn btn-primary btn-sm">向上取整</button>
    </div>
</div>
<script src="js/moment.min.js"></script>
<script src="js/moment-timezone.min.js"></script>
<script src="js/time_page.js"></script>
</body>
</html>
